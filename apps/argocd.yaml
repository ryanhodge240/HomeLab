apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: portfolio=ghcr.io/ryanhodge240/portfolio
    argocd-image-updater.argoproj.io/portfolio.update-strategy: digest
spec:
  project: default
  source:
    repoURL: git@github.com:ryanhodge240/HomeLab.git
    targetRevision: main
    path: argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

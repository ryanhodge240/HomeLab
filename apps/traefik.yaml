apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/ryanhodge240/HomeLab
      targetRevision: main
      path: traefik/helm
      helm:
        valueFiles:
          - values.yaml
    - repoURL: https://github.com/ryanhodge240/HomeLab
      targetRevision: main
      path: traefik/kustomize
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
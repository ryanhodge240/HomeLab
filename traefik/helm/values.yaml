# Documentation for Traefik Helm chart can be found at https://doc.traefik.io/traefik/getting-started/install-traefik/#helm-chart
# I referenced https://github.com/traefik/traefik-helm-chart/blob/master/traefik/values.yaml
traefik:
  deployment:
    enabled: true

  ports:
    web:
      port: 80
      exposedPort: 80
      nodePort: 30000
      http:
        redirections:
          entryPoint:
            to: websecure
            scheme: https
            permanent: true
    websecure:
      port: 443
      exposedPort: 443
      nodePort: 30001

  # Enable Gateway API Provider & Disables the KubernetesIngress provider
  # Providers tell Traefik where to find routing configuration.
  providers:
    kubernetesIngress:
      enabled: true
    kubernetesGateway:
      enabled: true

  gateway:
    enabled: true
    name: traefik-gateway
    namespace: traefik
    listeners:
      web:
        protocol: HTTP
        port: 80
        namespacePolicy:
          from: All
      websecure-lan:
        protocol: HTTPS
        port: 443
        hostname: "*.lan"
        namespacePolicy:
          from: All
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: lan-wildcard-tls
            namespace: traefik

      websecure-public:
        protocol: HTTPS
        port: 443
        namespacePolicy:
          from: All
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: personal-website-tls
            namespace: traefik

  service:
    type: LoadBalancer
    annotations:
      metallb.io/loadBalancerIPs: 10.0.0.243

  logs:
    general:
      level: INFO
    access:
      enabled: true

  # Enables Prometheus for Metrics
  metrics:
    prometheus:
      enabled: true
  
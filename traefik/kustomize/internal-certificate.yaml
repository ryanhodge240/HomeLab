apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lan-wildcard-cert
  namespace: traefik
spec:
  secretName: lan-wildcard-tls
  dnsNames:
    - argo.lan
    - portfolio.lan
    - ryanhodge.lan
    - ai.ryanhodge.lan
    - nick.ryanhodge.lan
    - pihole.lan
    - lrw.lan
    - ha.lan
    - geo.lan
    - "*.lan"
    - lan
  issuerRef:
    name: internal-ca-issuer
    kind: ClusterIssuer